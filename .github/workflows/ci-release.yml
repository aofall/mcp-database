name: CI and Release

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      create_release:
        description: "Create a GitHub Release from this run"
        required: true
        default: false
        type: boolean
      release_version:
        description: "Release version, for example v1.0.0. Required when create_release is true."
        required: false
        type: string

permissions:
  contents: write

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Run tests
        run: go test ./...

  build:
    name: Build ${{ matrix.goos }}-${{ matrix.goarch }}
    runs-on: ubuntu-latest
    needs: test

    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: windows
            goarch: amd64
            ext: .exe
          - goos: linux
            goarch: amd64
            ext: ""
          - goos: linux
            goarch: arm64
            ext: ""
          - goos: darwin
            goarch: amd64
            ext: ""
          - goos: darwin
            goarch: arm64
            ext: ""

    env:
      APP_NAME: mcp-database
      GOOS: ${{ matrix.goos }}
      GOARCH: ${{ matrix.goarch }}
      CGO_ENABLED: 0

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build binary
        run: |
          mkdir -p dist
          go build -trimpath -ldflags="-s -w" -o "dist/${APP_NAME}-${GOOS}-${GOARCH}${{ matrix.ext }}" .

      - name: Package artifact
        shell: bash
        run: |
          version="${GITHUB_REF_NAME}"
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" && -n "${{ github.event.inputs.release_version }}" ]]; then
            version="${{ github.event.inputs.release_version }}"
          fi
          if [[ -z "$version" ]]; then
            version="${GITHUB_SHA}"
          fi

          package_dir="dist/${APP_NAME}-${version}-${GOOS}-${GOARCH}"
          mkdir -p "$package_dir"

          if [[ "$GOOS" == "windows" ]]; then
            cp "dist/${APP_NAME}-${GOOS}-${GOARCH}.exe" "$package_dir/${APP_NAME}.exe"
          else
            cp "dist/${APP_NAME}-${GOOS}-${GOARCH}" "$package_dir/${APP_NAME}"
          fi

          cp "examples/example-config.yaml" "$package_dir/example-config.yaml"
          cp "docs/README.md" "$package_dir/README.md"
          cp "docs/README-cn.md" "$package_dir/README-cn.md"
          cp "docs/SKILL.md" "$package_dir/SKILL.md"

          if [[ "$GOOS" == "windows" ]]; then
            (cd "$package_dir" && zip -r "../${APP_NAME}-${version}-${GOOS}-${GOARCH}.zip" .)
          else
            tar -czf "dist/${APP_NAME}-${version}-${GOOS}-${GOARCH}.tar.gz" -C "$package_dir" .
          fi

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: mcp-database-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            dist/*.zip
            dist/*.tar.gz
          if-no-files-found: error

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: github.ref_type == 'tag' || (github.event_name == 'workflow_dispatch' && github.event.inputs.create_release == 'true')

    steps:
      - name: Validate manual release version
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.release_version == ''
        run: |
          echo "release_version is required when create_release is true"
          exit 1

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_type == 'tag' && github.ref_name || github.event.inputs.release_version }}
          name: ${{ github.ref_type == 'tag' && github.ref_name || github.event.inputs.release_version }}
          files: |
            release-assets/*.zip
            release-assets/*.tar.gz
          generate_release_notes: true
