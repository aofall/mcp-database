instances:
  # Copy this file to config.yaml and fill in real connection details locally.
  # Do not commit config.yaml, because it contains database credentials.

  dev_oracle:
    type: "oracle"
    user: "YOUR_USERNAME"
    password: "YOUR_PASSWORD"
    host: "127.0.0.1"
    port: 1521
    serviceName: "YOUR_SERVICE_NAME"

  dev_mysql:
    type: "mysql"
    user: "YOUR_USERNAME"
    password: "YOUR_PASSWORD"
    host: "127.0.0.1"
    port: 3306
    database: "YOUR_DATABASE"
    charset: "utf8mb4"

  dev_postgresql:
    # Supported values: "postgresql", "postgres", "pg"
    type: "postgresql"
    user: "YOUR_USERNAME"
    password: "YOUR_PASSWORD"
    host: "127.0.0.1"
    port: 5432
    database: "YOUR_DATABASE"
    sslMode: "disable"

  # More instances can be added under instances:
  # prod_oracle:
  #   type: "oracle"
  #   user: "YOUR_PROD_USERNAME"
  #   password: "YOUR_PROD_PASSWORD"
  #   host: "prod-db.example.com"
  #   port: 1521
  #   serviceName: "PROD_SERVICE"
